[TVTDataBroadcastingWV2]
; 起動時に自動的にプラグインを有効化する（0=無効、1=有効）
AutoEnable=0

; ネットワーク機能を有効化する（0=無効、1=有効）
EnableNetwork=0

; 実況勢いパネルのWebSocket接続先URI
ChannelsWsUri=ws://localhost:5000/api/channels/ws

; コメント取得を有効化する（0=無効、1=有効）
EnableComment=0

; リモコン操作を無効化する（0=無効化しない、1=無効化）
DisableRemoteControl=0

; TVTestの音量設定を使用する（0=使用しない、1=使用する）
UseTVTestVolume=1

; TVTestのチャンネル変更コマンドを使用する（0=使用しない、1=使用する）
UseTVTestChannelCommand=1

; プラグイン無効化時に字幕状態を復元する（0=復元しない、1=復元する）
RestoreCaptionState=0

; プラグイン有効化時に字幕を自動的に有効化する（0=しない、1=する）
AutoEnableCaption=0

; リソースディレクトリのパス（省略時はプラグインと同じフォルダのresources\）
; ResourceDirectory=

; コメント表示（0=非表示、1=表示）
CommentEnabled=1

; コメントの不透明度（0〜100%）
CommentOpacity=100

; コメントのスクロール時間（1000〜5000 ms）
CommentDuration=4000

; コメントの文字サイズ・medium基準（8〜64px）、small=x0.75、big=x1.5
CommentFontSize=24

; コメントの影（0=無効、1=有効）
CommentShadow=1

; コメントの縁取り（0=無効、1=有効）
CommentOutline=0

; コメントの影の色（CSSカラー文字列）
CommentShadowColor=rgba(0,0,0,0.7)

; 投稿欄の背景色（NicoJK相当）。投稿先が避難所(R接続)ならRefugeEditBoxColor、
; ニコニコ(L接続)ならNicoEditBoxColorで着色します。
;NicoEditBoxColor=#bbbbff
;RefugeEditBoxColor=#ffbbbb

; ===== 接続方式（NicoJK互換） =====
; 避難所URLテンプレート。{jkID}→jk{n}、{chatStreamID}→refugeChatStreamIDに置換されます。
; 設定すると、対応チャンネルは Rコマンドで避難所(NX-Jikkyo等)に接続します。
; 空にすると内蔵テーブル/[ChatStreams]のchatStreamIDで Lコマンド=ニコニコ直結になります。
;RefugeUri=wss://nx-jikkyo.tsukumijima.net/api/v1/channels/{jkID}/ws/watch

; 1 でニコニコ実況と避難所の両方に同時接続（要chatStreamID）。0で片方のみ（既定）。
RefugeMixing=0

; 1 で転送(refuge側に流れてきたニコ由来)コメントを除去（Rコマンドのtype=2）。
DropForwardedComment=0

; mixing時の投稿先。0=ニコニコ / 1=避難所。
PostToRefuge=0

; ===== [ChatStreams] =====
; チャンネル(jkID)毎のストリームID表。書式: {jkID}={chatStreamID}[,{refugeChatStreamID}]
;   カンマ無し      … nico/避難所とも同じID
;   ID,            … nicoのみ
;   ,値            … 避難所のみ（nico無し）。値はrefugeUriの{chatStreamID}に入る（フラグ兼用）
;   （空）          … そのjkIDを削除
; 内蔵テーブル(jk1-9/101/211のニコ公式ch)に上書きマージされます。
; 例:
; [ChatStreams]
; 141=,NX
; 211=ch2646846,NX

; NG（あぼーん）設定。該当するコメントは非表示になります。
; キーは連番（0,1,2,...）。番号の欠けは無視されるので自由に追加・削除できます。
;   Regex{n}=   コメント本文に対する正規表現（部分一致 / std::regex ECMAScript）
;   User{n}=    user_id 完全一致でそのユーザを非表示
;   Command{n}= mailフィールドのコマンド完全一致（例: 184 で匿名コメントを非表示）
; 例:
; [NG]
; Regex0=(https?://|ｈｔｔｐ)
; Regex1=^[wｗ]+$
; User0=ABCdef12345
; Command0=184

; [CustomReplace] コメント本文の正規表現置換（表示・NG判定の前に適用）。
; 値はsed形式 s{区切り}正規表現{区切り}置換{区切り}（末尾gは任意）。置換は$1等の後方参照可。
; 例:
; [CustomReplace]
; Replace0=s/草/w/g
; Replace1=s/(https?:\/\/\S+)/[URL]/g
